services:
  - type: web
    name: tuco-parents-circle
    runtime: node
    repo: https://github.com/dk-nishwanth/Tuco-parents-circle.git
    plan: starter
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma db push
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false  # Set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: FRONTEND_URL
        sync: false
