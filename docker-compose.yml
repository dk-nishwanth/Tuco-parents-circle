version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://tuco:tuco_password@db:5432/tuco_parents_circle?schema=public
      - JWT_SECRET=your_super_secret_development_key_change_in_production
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tuco
      - POSTGRES_PASSWORD=tuco_password
      - POSTGRES_DB=tuco_parents_circle
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tuco -d tuco_parents_circle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
